apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "maintenant.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "maintenant.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate  # SQLite single-writer
  selector:
    matchLabels:
      {{- include "maintenant.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "maintenant.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "maintenant.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        fsGroup: 65534
      containers:
        - name: maintenant
          image: {{ include "maintenant.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: MAINTENANT_ADDR
              value: "0.0.0.0:8080"
            - name: MAINTENANT_RUNTIME
              value: {{ .Values.runtime | quote }}
            - name: MAINTENANT_DB
              value: "/data/maintenant.db"
            {{- if .Values.license.existingSecret }}
            - name: MAINTENANT_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.license.existingSecret }}
                  key: license-key
            {{- else if .Values.license.key }}
            - name: MAINTENANT_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "maintenant.fullname" . }}-license
                  key: license-key
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.persistence.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
          {{- else if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "maintenant.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}